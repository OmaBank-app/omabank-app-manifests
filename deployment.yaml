apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: omabank-api-external-secret
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: azure-kv-store
    kind: ClusterSecretStore
  target:
    name: omabank-api-secret-generated # The name of the K8s secret ESO will create
    creationPolicy: Owner
  data:
  # Pulls the exact database connection string Terraform pushed to Key Vault
  - secretKey: DATABASE_URL
    remoteRef:
      key: omabank-db-connection-string
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omabank-api
  labels:
    app: omabank-api
    tier: backend
    sec-zone: trusted
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: omabank-api
  template:
    metadata:
      labels:
        app: omabank-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api-container
        image: omabankacrdev923.azurecr.io/omabank-api:latest
        imagePullPolicy: Always
        
        # 100% Zero-Trust: Injects the dynamically generated secret from ESO!
        envFrom:
        - secretRef:
            name: omabank-api-secret-generated
            
        ports:
        - containerPort: 8000
          name: http-api
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          capabilities:
            drop:
            - ALL
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        volumeMounts:
        - mountPath: /tmp
          name: ephemeral-tmp
      volumes:
      - name: ephemeral-tmp
        emptyDir: {}