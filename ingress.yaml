apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omabank-api-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - "20.87.253.92.nip.io"
    secretName: omabank-tls-secret
  rules:
  - host: "20.87.253.92.nip.io"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: omabank-api-service
            port:
              number: 8000