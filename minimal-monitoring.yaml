# Ultra-lean Prometheus stack for B2s_v2 node (2 vCPU, 4GB RAM)

# 1. Disable expensive components
alertmanager:
  enabled: false

kubeStateMetrics:
  enabled: true
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi  

nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi  

prometheusOperator:
  enabled: false

# 2. Optimize Grafana with secure password injection
grafana:
  enabled: true
  persistence:
    enabled: false  # Disable to save I/O
  
  # Secure managed secret from Key Vault
  admin:25
    existingSecret: "grafana-admin-secret"
    userKey: admin-user
    passwordKey: admin-password
  
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  
  sidecar:
    dashboards:
      enabled: true
      defaultDashboardsEnabled: false  # Disable heavy default dashboards
    datasources:
      enabled: true

# 3. Disable Prometheus completely due to CPU constraints
prometheus:
  enabled: false