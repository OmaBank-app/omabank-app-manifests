apiVersion: v1
kind: Service
metadata:
  name: omabank-redis-service
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: omabank-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omabank-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: omabank-redis
  template:
    metadata:
      labels:
        app: omabank-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          limits:
            memory: "128Mi"
            cpu: "100m"
