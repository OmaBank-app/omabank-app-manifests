apiVersion: apps/v1
kind: Deployment
metadata:
  name: omabank-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: omabank-worker
  template:
    metadata:
      labels:
        app: omabank-worker
    spec:
      serviceAccountName: omabank-api-sa
      containers:
      - name: worker-container
        image: omabankacrdev923.azurecr.io/omabank-api:latest
        imagePullPolicy: Always

        command: ["/usr/local/bin/python", "-m", "celery", "-A", "src.worker.celery_app.celery_instance", "worker", "--loglevel=info", "--pool=solo"]

        # Inject the database password from Key Vault
        envFrom:
        - secretRef:
            name: omabank-api-secret-generated
        env:
        - name: REDIS_URL
          value: "redis://omabank-redis-service:6379/0"

        resources:
          limits:
            memory: "128Mi"
            cpu: "100m"
